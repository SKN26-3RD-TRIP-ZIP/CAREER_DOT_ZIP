services:
  redis:
    image: redis:7-alpine
    container_name: career_zip_redis
    restart: unless-stopped
    expose:
      - "6379"

  backend:
    # 이미지는 GitHub Actions에서 빌드한다. EC2 compose에는 build 항목을 두지 않는다.
    # 워크플로는 latest 대신 커밋 SHA를 BACKEND_TAG로 주입해 배포 버전을 고정한다.
    image: ${BACKEND_IMAGE:-ghcr.io/skn26-3rd-trip-zip/careerzip-backend}:${BACKEND_TAG:-latest}
    container_name: career_zip_backend
    restart: unless-stopped
    env_file:
      # 이 파일은 EC2에만 존재하며 Actions가 업로드하거나 내용을 변경하지 않는다.
      - ./CAREER_DOT_ZIP_BACKEND/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      RUN_MIGRATIONS: "0"
      # Keep one Python process on the current small EC2 instance; gthread
      # still serves concurrent I/O requests without duplicating AI modules.
      GUNICORN_WORKERS: "1"
      GUNICORN_THREADS: "4"
      # Loading torch/sentence-transformers can OOM this instance. The report
      # keeps using LLM scores and treats SBERT as an optional metric.
      SBERT_ENABLED: "false"
    depends_on:
      - redis
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    expose:
      - "8000"

  frontend:
    # nginx 설정과 Vite 결과물까지 포함된 완성 이미지를 GHCR에서 pull한다.
    # 호스트의 HTTPS 인증서/nginx 설정은 별도이므로 이 서비스가 덮어쓰지 않는다.
    image: ${FRONTEND_IMAGE:-ghcr.io/skn26-3rd-trip-zip/careerzip-frontend}:${FRONTEND_TAG:-latest}
    container_name: career_zip_frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # 기존 EC2 Let's Encrypt 인증서를 이미지에 복사하지 않고 읽기 전용으로 사용한다.
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend

volumes:
  media_data:
  static_data:
